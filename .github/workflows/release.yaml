name: "Release"

on:
  push:
    branches:
      - "beta"
      - "alpha"
  workflow_dispatch:
    inputs:
      draft:
        type: boolean
        description: "Draft release"
        default: false
      release_type:
        type: choice
        description: "Release type"
        default: "auto"
        options:
          - "auto"
          - "patch"
          - "minor"
          - "major"

jobs:
  publish:
    name: "Publish"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    concurrency:
      group: ${{ github.workflow }}
    steps:
      - name: "Checkout the repository"
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: "Checkout latest revision"
        run: |
          git fetch origin ${{ github.ref_name }}
          git reset --hard origin/${{ github.ref_name }}

      - name: "Setup pnpm"
        uses: pnpm/action-setup@v6
        with:
          version: "latest"

      - name: "Setup node"
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: "Release Package"
        run: pnpm dlx @jcwillox/semantic-release-config
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SEMANTIC_RELEASE_GITHUB_DRAFT: ${{ inputs.draft }}
          SEMANTIC_RELEASE_FORCE_RELEASE: ${{ inputs.release_type }}
          SEMANTIC_RELEASE_CHANGELOG_FILE: "CHANGELOG.md"
          SEMANTIC_RELEASE_CMD_PREPARE: |
            sed -i -E 's#<!ENTITY version[[:space:]]+"[^"]*"#<!ENTITY version    "'"${nextRelease.version}"'"#' zfs.master.plg
            sed -i -E 's#<!ENTITY gitURL[[:space:]]+"[^"]*"#<!ENTITY gitURL    "https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}"#' zfs.master.plg
            sed -i -e '/<CHANGES>/r CHANGELOG.md' -e '/<CHANGES>/,/<\/CHANGES>/{/<CHANGES>/!{/<\/CHANGES>/!d}}' zfs.master.plg
            tar -czf "zfs.master-${nextRelease.version}.tgz" zfs.master
          SEMANTIC_RELEASE_GITHUB_ASSETS: '["zfs.master-*.tgz"]'
          SEMANTIC_RELEASE_GIT_ASSETS: '["CHANGELOG.md", "zfs.master.plg"]'
